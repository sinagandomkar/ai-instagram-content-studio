services:
  # Applies pending migrations to the shared SQLite volume. Uses the `builder`
  # stage (not the slim runner) because the Prisma CLI is a devDependency and
  # isn't part of the standalone runtime image — see Dockerfile.
  migrate:
    build:
      context: .
      target: builder
    command: npx prisma migrate deploy
    environment:
      - DATABASE_URL=file:/data/dev.db
    volumes:
      - sqlite-data:/data

  app:
    build:
      context: .
    ports:
      - "3000:3000"
    environment:
      - SQLITE_DB_PATH=/data/dev.db
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - COMPOSIO_API_KEY=${COMPOSIO_API_KEY:-}
      - COMPOSIO_INSTAGRAM_AUTH_CONFIG_ID=${COMPOSIO_INSTAGRAM_AUTH_CONFIG_ID:-}
      - COMPOSIO_USER_ID=${COMPOSIO_USER_ID:-local-user}
    volumes:
      - sqlite-data:/data
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  sqlite-data:
