services:
  # Applies pending migrations against Supabase (or any Postgres host) —
  # use the *session*-mode pooler URL here (port 5432), not the transaction-mode
  # one the app itself uses (port 6543) — see docs/DEPLOYMENT.md §1.
  # Uses the `builder` stage (full `node_modules`, including the `prisma` CLI —
  # a devDependency not present in the slim runner image).
  migrate:
    build:
      context: .
      target: builder
    command: npx prisma migrate deploy
    environment:
      - DATABASE_URL=${DATABASE_URL_MIGRATE:?set to the session-pooler URL, port 5432}

  app:
    build:
      context: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL:?set to the transaction-pooler URL, port 6543}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - COMPOSIO_API_KEY=${COMPOSIO_API_KEY:-}
      - COMPOSIO_INSTAGRAM_AUTH_CONFIG_ID=${COMPOSIO_INSTAGRAM_AUTH_CONFIG_ID:-}
      - COMPOSIO_USER_ID=${COMPOSIO_USER_ID:-local-user}
    depends_on:
      migrate:
        condition: service_completed_successfully
