services:
  # Self-hosted Postgres for the Docker path. Skip this service (and point
  # DATABASE_URL at Supabase instead) if you'd rather not run your own DB.
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=studio
      - POSTGRES_PASSWORD=studio
      - POSTGRES_DB=studio
    volumes:
      - pg-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # Applies pending migrations. Uses the `builder` stage (full `node_modules`,
  # including the `prisma` CLI — a devDependency not present in the slim
  # runner image) — see Dockerfile.
  migrate:
    build:
      context: .
      target: builder
    command: npx prisma migrate deploy
    environment:
      - DATABASE_URL=postgresql://studio:studio@db:5432/studio
    depends_on:
      - db

  app:
    build:
      context: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://studio:studio@db:5432/studio
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - COMPOSIO_API_KEY=${COMPOSIO_API_KEY:-}
      - COMPOSIO_INSTAGRAM_AUTH_CONFIG_ID=${COMPOSIO_INSTAGRAM_AUTH_CONFIG_ID:-}
      - COMPOSIO_USER_ID=${COMPOSIO_USER_ID:-local-user}
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  pg-data:
